name: Synthetic Tests

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: 🔍 Run Synthetic Scorer (DOM Resolution)
        run: go test -race -v -count=1 ./pkg/scorer/synthetic/...

      - name: ⚙️ Run Runtime Engine Logic (Flow & Vars)
        run: go test -race -v -count=1 ./pkg/runtime/...

      - name: 🔌 Run CDP Transport Tests (concurrency-critical)
        run: go test -race -v -count=1 ./pkg/cdp/...

      - name: 👷 Run Worker Pool & Port Allocator Tests
        run: go test -race -v -count=1 ./pkg/worker/...

      - name: 🧪 Run Package-level Unit Tests
        run: go test -race ./pkg/...

      - name: ✅ Run All Integration Tests
        run: go test -race ./...
